# pnpm dependency-build allow list.
#
# pnpm does NOT run dependency lifecycle scripts (preinstall/install/postinstall)
# by default — a supply-chain hardening default that npm lacks. Only packages
# mapped to `true` under `allowBuilds` may run their build scripts during a
# local `pnpm install`; everything else is installed inert (and an unreviewed
# build script fails the install with ERR_PNPM_IGNORED_BUILDS).
#
# `allowBuilds` is pnpm v11's replacement for the v10 `onlyBuiltDependencies`
# list (which v11 REMOVED entirely — pnpm 11 silently ignores it, then keeps
# re-injecting a `set this to true or false` placeholder stub on every install
# because it sees no approval). It is a map of package matcher -> boolean:
# `true` allows build scripts, `false` explicitly denies them. See
# docs/features/continuous-integration/adrs/package-manager.md.
#
# Why each entry is here (both legitimately need their build script => true):
#   - esbuild: its postinstall resolves and installs the platform-specific
#     binary into the package's own bin dir. vite/electron-vite bundle through
#     esbuild, so the build chain depends on it.
#   - electron-winstaller: its install script selects the 7-Zip binary for the
#     host arch, used when `electron-builder` produces a Windows installer
#     (`pnpm dist`). Inert installs would break Windows packaging.
#
# Note: electron itself is NOT listed — recent electron has no gated lifecycle
# script; @electron/get fetches the runtime binary lazily on first use, so it
# needs no build-script approval.
#
# CI installs with `--ignore-scripts`, so none of these run on CI — CI never
# runs a native binary it didn't need to build. This map governs local
# installs only, where dev and packaging do need them.
allowBuilds:
  esbuild: true
  electron-winstaller: true
