name: Claude Code Review

# Per-PR code review using the `code-review` plugin from
# `anthropics/claude-code`'s marketplace. Skips fork PRs and Dependabot
# PRs (the latter handled by claude-dependency-review.yml).
#
# Threat model: docs/features/continuous-integration/adrs/ci-threat-model.md
# Action + plugin-marketplace pinning: docs/features/continuous-integration/adrs/claude-code-action-pinning.md

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Allowlist of code-and-code-adjacent paths. Docs-only PRs skip
    # Claude review; new top-level configs need explicit additions
    # here. Excluded by design: `pnpm-lock.yaml` (covered by
    # pnpm-audit + license-check + dep-review workflow); appearance-only
    # files (`.prettierrc*`, `.gitattributes`).
    paths:
      - 'src/**' # application source
      - '.storybook/**' # Storybook config (drives the storybook build)
      - 'package.json' # intent (new deps, scripts, engines)
      - 'pnpm-workspace.yaml' # allowBuilds governs lifecycle-script execution (supply-chain)
      - '.npmrc' # node-linker / resolution model — changes how the whole tree installs
      - 'electron.vite.config.ts' # build/lint/typecheck-affecting configs
      - 'eslint.config.mjs'
      - 'tsconfig*.json'
      - '.fallowrc.json'
      - '.github/**' # CI/Actions workflow changes

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    # Skip fork PRs (untrusted code) and Dependabot PRs (handled by the
    # dep-review workflow with a tighter prompt).
    if: |
      github.event.pull_request.head.repo.fork == false &&
      github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      # `pull-requests: write` covers both inline review comments (via
      # `mcp__github_inline_comment__create_inline_comment`) and
      # top-level PR comments (via `Bash(gh pr comment:*)`). `id-token:
      # write` is OIDC token issuance to the Claude GitHub App, not
      # repo writes. This matches Anthropic's canonical PR-review
      # example in `anthropics/claude-code-action/docs/solutions.md`.
      # Note: these permissions are necessary but not sufficient — the
      # `mcp__github_inline_comment__*` server is opt-in via the
      # `--allowedTools` flag below.
      pull-requests: write
      id-token: write # OIDC token issuance; not repo write. See ADR.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      # `anthropics/claude-code-action@v1` AND `plugin_marketplaces` are
      # both moving references and both deliberately unpinned. See
      # adrs/claude-code-action-pinning.md for the reasoning and revisit
      # triggers (especially: tool-allowlist widening or Anthropic-org
      # security incident).
      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1.0.130
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          # Sonnet 4.6 — sufficient for routine review; predictable cost.
          # Bump to Opus for deeper review.
          #
          # --allowedTools mirrors the `code-review` plugin's own frontmatter
          # (`plugins/code-review/commands/code-review.md`). In agent mode
          # the action does NOT read the plugin's `allowed-tools:` line —
          # it gates MCP-server registration on the workflow's
          # `--allowedTools` flag (claude-code-action's
          # `src/mcp/install-mcp-server.ts`: the github_inline_comment
          # server is only spawned when an `mcp__github_inline_comment__*`
          # entry is present). Without this list the plugin's posting
          # step is denied silently (`permission_denials_count` > 0,
          # "No buffered inline comments", no PR comment). Observed on
          # PR #62 (18 denials) and PR #66 (2 denials) before this fix.
          # See adrs/claude-code-action-pinning.md for the agent-mode
          # mechanics rationale. Pattern aligned with Anthropic's
          # canonical "Automatic PR Code Review" example in
          # `anthropics/claude-code-action/docs/solutions.md`; extra
          # `gh issue`/`gh search` entries beyond the canonical four
          # come from the plugin's own frontmatter (used by its
          # "related issues" lookup step).
          claude_args: >-
            --model claude-sonnet-4-6
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*)"
