name: Claude Code Review

# Per-PR code review using the `code-review` plugin from
# `anthropics/claude-code`'s marketplace. Skips fork PRs and Dependabot
# PRs (the latter handled by claude-dependency-review.yml).
#
# Threat model: docs/features/continuous-integration/adrs/ci-threat-model.md
# Action + plugin-marketplace pinning: docs/features/continuous-integration/adrs/claude-code-action-pinning.md

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Allowlist of code-and-code-adjacent paths. Docs-only PRs skip
    # Claude review; new top-level configs need explicit additions
    # here. Excluded by design: `package-lock.json` (covered by
    # npm-audit + license-check + dep-review workflow); appearance-only
    # files (`.prettierrc*`, `.gitattributes`).
    paths:
      - 'src/**' # application source
      - '.storybook/**' # Storybook config (drives the storybook build)
      - 'package.json' # intent (new deps, scripts, engines)
      - 'electron.vite.config.ts' # build/lint/typecheck-affecting configs
      - 'eslint.config.mjs'
      - 'tsconfig*.json'
      - '.fallowrc.json'
      - '.github/**' # CI/Actions workflow changes

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    # Skip fork PRs (untrusted code) and Dependabot PRs (handled by the
    # dep-review workflow with a tighter prompt).
    if: |
      github.event.pull_request.head.repo.fork == false &&
      github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      # `write` is required for the `code-review` plugin to post the review
      # comment. `id-token: write` below is independent — it's for OIDC
      # token issuance to the Claude GitHub App, not for repo writes.
      # Without `pull-requests: write` here, the plugin completes its
      # analysis but every comment-posting tool call is denied by the
      # harness; the run reports `permission_denials_count` > 0 and no
      # review comment ever appears on the PR. (Failure mode observed on
      # PR #62, where the run completed cleanly with 18 denials.)
      pull-requests: write
      issues: read
      id-token: write # OIDC token issuance; not repo write. See ADR.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      # `anthropics/claude-code-action@v1` AND `plugin_marketplaces` are
      # both moving references and both deliberately unpinned. See
      # adrs/claude-code-action-pinning.md for the reasoning and revisit
      # triggers (especially: tool-allowlist widening or Anthropic-org
      # security incident).
      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          # Sonnet 4.6 — sufficient for routine review; predictable cost.
          # Bump to Opus for deeper review.
          claude_args: '--model claude-sonnet-4-6'
