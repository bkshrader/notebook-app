name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Threat model: malicious fork PRs. Default permissions are read-only;
# GitHub already downgrades GITHUB_TOKEN for fork-PR runs, but we
# declare this explicitly so the intent survives any future org-policy
# change. No job in this workflow needs write access.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run lint

  format:
    name: format
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run format:check

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run typecheck

  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run build

  audit:
    name: audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run audit:fallow -- --base origin/main

  npm-audit:
    name: npm-audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      # Resolve the full dep tree without running install scripts; `npm audit`
      # only needs the lockfile + a populated node_modules manifest, not the
      # actual package code. `--ignore-scripts` blocks lifecycle script
      # execution from any upgraded dep on PR runs.
      - run: npm ci --ignore-scripts
      - name: Audit dependencies (fail on high+critical)
        run: npm audit --audit-level=high

  license-check:
    # Gates that every redistributed (production) dep ships with an
    # AGPL-3.0-or-later compatible license. DevDeps are deliberately not
    # checked here — they do not redistribute, so their license has no
    # compliance impact. Changes to devDep licenses are surfaced advisorily
    # in the Claude dependency-review workflow instead.
    name: license-check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts
      # Strict allow list. Any prod dep whose license string is not on this
      # list fails CI — including the obvious AGPL-incompatible licenses
      # (BUSL, SSPL, Elastic, Commons-Clause), missing/custom markers
      # (UNLICENSED, Custom, SEE LICENSE IN *, LicenseRef-*), and any novel
      # license we have not explicitly evaluated. Note: `license-checker`
      # rejects `--failOn` and `--onlyAllow` together; allow-only is the
      # stricter of the two and the correct choice for this project.
      #
      # `license-checker` lives in devDependencies (not `npx --yes`) so the
      # lockfile's integrity hash guards against a registry-side substitution
      # of the tool that gates everything else.
      - name: Check production-dep licenses against allow list
        run: |
          npx license-checker \
            --production \
            --excludePrivatePackages \
            --onlyAllow "MIT;ISC;Apache-2.0;BSD-2-Clause;BSD-3-Clause;0BSD;BSD;MPL-2.0;BlueOak-1.0.0;CC0-1.0;CC-BY-4.0;Unlicense;Python-2.0;Zlib;AGPL-3.0-or-later;AGPL-3.0-only;GPL-3.0-or-later;GPL-3.0-only"

  storybook:
    name: storybook
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium
      - name: Build Storybook
        run: npm run build-storybook
      - name: Run story tests (a11y + interaction via Vitest)
        run: npm run test-storybook
      # Skip artifact upload on fork PRs — a malicious fork PR could
      # populate storybook-static/ with attacker-controlled HTML that a
      # reviewer might download and open. Trusted-source runs only.
      - name: Upload Storybook static site
        if: always() && github.event.pull_request.head.repo.fork != true
        uses: actions/upload-artifact@v7
        with:
          name: storybook-static
          path: storybook-static
          retention-days: 7
