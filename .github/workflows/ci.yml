name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Threat model: malicious fork PRs. Default permissions are read-only;
# GitHub already downgrades GITHUB_TOKEN for fork-PR runs, but we
# declare this explicitly so the intent survives any future org-policy
# change. No job in this workflow needs write access.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm lint

  format:
    name: format
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm format:check

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm typecheck

  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm build

  audit:
    name: audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm audit:fallow --base origin/main

  pnpm-audit:
    name: pnpm-audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      # Resolve the full dep tree without running install scripts; `pnpm audit`
      # queries the registry advisory DB against the resolved lockfile, not the
      # actual package code. `--ignore-scripts` blocks lifecycle script
      # execution from any upgraded dep on PR runs.
      - run: pnpm install --frozen-lockfile --ignore-scripts
      # Production deps are what we redistribute to users; high+ severity
      # advisories that reach them are real attack surface and must block
      # merge. `--prod` restricts the audit to the dependencies subtree,
      # excluding devDependencies, so this step only flags advisories with a
      # prod-reachable path.
      - name: Audit production deps (blocking)
        run: pnpm audit --prod --audit-level high
      # Advisory check on the full tree, including devDeps. DevDep
      # advisories don't ship to users, but stale tooling is worth
      # surfacing. The blocking step above already covered the prod-
      # reachable findings, so anything caught here is devDep-only.
      - name: Audit full tree (advisory; devDep findings non-blocking)
        id: audit_full
        run: pnpm audit --audit-level high
        continue-on-error: true
      # Surface each devDep advisory as a PR-level `::warning::`
      # annotation so they appear as yellow ⚠ entries on the PR's
      # merge box and Files Changed tab without requiring a click into
      # the job log. One annotation per advisory; title carries package
      # + severity + the advisory title, body carries the advisory URL.
      # pnpm's `audit --json` emits the npm-registry advisory shape:
      # `{ advisories: { <id>: { module_name, severity, title, url, ... } } }`
      # (the npm v6 schema), which differs from npm v7+'s `vulnerabilities`
      # map — hence the parser shape here is pnpm-specific.
      - name: Surface devDep advisories as warnings
        if: steps.audit_full.outcome == 'failure'
        run: |
          pnpm audit --json 2>/dev/null | node -e '
            const j = JSON.parse(require("fs").readFileSync(0, "utf8"));
            const advisories = Object.values(j.advisories || {})
              .filter(a => ["high", "critical"].includes(a.severity));
            for (const a of advisories) {
              const name = a.module_name || "unknown";
              const title = a.title || `advisory in ${name}`;
              const url = a.url || "";
              const paths = (a.findings || [])
                .flatMap(f => f.paths || [])
                .slice(0, 3)
                .join(", ");
              const tail = paths ? ` (via ${paths})` : "";
              const annTitle = `${name} (${a.severity}) — ${title}`;
              const annBody = url ? `${url}${tail}` : `unknown advisory${tail}`;
              console.log(`::warning title=${annTitle}::${annBody}`);
            }
          '

  license-check:
    # Gates that every redistributed (production) dep ships with an
    # AGPL-3.0-or-later compatible license. DevDeps are deliberately not
    # checked here — they do not redistribute, so their license has no
    # compliance impact. Changes to devDep licenses are surfaced advisorily
    # in the Claude dependency-review workflow instead.
    name: license-check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts
      # Strict allow list. Any prod dep whose license string is not on this
      # list fails CI — including the obvious AGPL-incompatible licenses
      # (BUSL, SSPL, Elastic, Commons-Clause), missing/custom markers
      # (UNLICENSED, Custom, SEE LICENSE IN *, LicenseRef-*), and any novel
      # license we have not explicitly evaluated. Note: `license-checker`
      # rejects `--failOn` and `--onlyAllow` together; allow-only is the
      # stricter of the two and the correct choice for this project.
      #
      # `license-checker` lives in devDependencies (not fetched on demand) so
      # the lockfile's integrity hash guards against a registry-side
      # substitution of the tool that gates everything else. `pnpm exec`
      # resolves it from the workspace's installed node_modules.
      - name: Check production-dep licenses against allow list
        run: |
          pnpm exec license-checker \
            --production \
            --excludePrivatePackages \
            --onlyAllow "MIT;ISC;Apache-2.0;BSD-2-Clause;BSD-3-Clause;0BSD;BSD;MPL-2.0;BlueOak-1.0.0;CC0-1.0;CC-BY-4.0;Unlicense;Python-2.0;Zlib;AGPL-3.0-or-later;AGPL-3.0-only;GPL-3.0-or-later;GPL-3.0-only;LGPL-3.0-or-later"

  storybook:
    name: storybook
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Install Playwright browser (chromium)
        run: pnpm exec playwright install --with-deps chromium
      - name: Build Storybook
        run: pnpm build-storybook
      - name: Run story tests (a11y + interaction via Vitest)
        run: pnpm test-storybook
      # `always()` overrides the default `success()` gate so we still upload
      # storybook-static/ when build-storybook or test-storybook fail — the
      # partial artifact is the diagnostic surface for the failure. The
      # fork-PR check is a security control: a malicious fork PR could
      # populate storybook-static/ with attacker-controlled HTML that a
      # reviewer might download and open, so we only preserve artifacts for
      # trusted-source runs.
      - name: Upload Storybook static site
        if: always() && github.event.pull_request.head.repo.fork != true
        uses: actions/upload-artifact@v7
        with:
          name: storybook-static
          path: storybook-static
          retention-days: 7
