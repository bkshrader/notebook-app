name: a11y (axe-core, full-surface)

# Component-level axe runs in the `storybook` job in ci.yml: every story is
# scanned by @storybook/addon-a11y (preview.tsx sets `a11y.test: 'error'`) so
# any WCAG 2.1 AA violation in any individual story fails CI on every PR.
#
# This workflow is reserved for the *next* layer: a Playwright-electron run
# that boots the assembled app and scans cross-component flows (focus order,
# contrast across decorators, composed surfaces). It is gated behind
# workflow_dispatch until the Electron renderer has rendered routes worth
# scanning.
#
# BEFORE BROADENING THE TRIGGER (e.g. to `pull_request`) — checklist:
#   - Keep `--ignore-scripts` on `pnpm install` (fork PR can ship malicious postinstall).
#   - Keep `permissions: contents: read` (no job here needs write).
#   - Keep `timeout-minutes` set (caps any compromise duration).
#   - Add `concurrency:` group so fork PRs cannot spam runner minutes.
#   - Pre-bake Chromium system deps into an image OR drop `--with-deps`
#     (passwordless sudo apt-get install elevates any prior RCE to root).
#   - `persist-credentials: false` on `actions/checkout` (already present).

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  axe:
    name: axe-core (full-surface)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - run: corepack enable
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Install Playwright browser (chromium)
        run: pnpm exec playwright install --with-deps chromium
      - name: Run axe-core via Playwright
        run: |
          echo "TODO: implement once the Electron app has rendered routes."
          echo "Per-story axe coverage already runs in ci.yml (storybook job)."
          echo "Expected shape here:"
          echo "  pnpm exec playwright test tests/a11y/"
          echo "Each test launches the Electron app (playwright-electron),"
          echo "navigates to a route, and calls AxeBuilder(...).analyze()."
