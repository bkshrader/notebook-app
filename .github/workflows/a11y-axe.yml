name: a11y (axe-core)

# Scaffolded ahead of the React UI landing. Currently a no-op — the `axe` job
# is gated behind a workflow_dispatch trigger so it does not run on PRs yet.
# When the app has a rendered surface, flip this to run on `push` + `pull_request`
# and replace the placeholder step with the real Playwright + @axe-core/playwright run.

on:
  workflow_dispatch:

jobs:
  axe:
    name: axe-core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run axe-core via Playwright
        run: |
          echo "TODO: implement once the app has a rendered surface."
          echo "Expected shape:"
          echo "  npx playwright test tests/a11y/"
          echo "Each test launches the Electron app (playwright-electron),"
          echo "navigates to a route, and calls AxeBuilder(...).analyze()."
          echo "Failing the build on any violation of WCAG 2.1 AA rules."
