name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

concurrency:
  group: claude-mention-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude:
    # Restricted to the repo owner: anyone with a GitHub account can write
    # '@claude' in a public comment, so the actor gate has to happen before
    # the action runs. Add handles to the array to grant access to future
    # collaborators.
    if: |
      contains(fromJSON('["bkshrader"]'), github.actor) &&
      (
        contains(github.event.comment.body, '@claude') ||
        contains(github.event.review.body, '@claude') ||
        contains(github.event.issue.body, '@claude') ||
        contains(github.event.issue.title, '@claude')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Read-and-comment tool allowlist. No Edit/Write/Bash(npm:*) for now —
          # this workflow is internet-triggered (anyone can write '@claude' in a
          # public comment), so the bound on damage from prompt injection or
          # account-takeover is the size of this allowlist. Broaden when this
          # workflow is actively used and the use cases are known.
          claude_args: '--allowedTools "Read,Grep,Glob,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh issue view:*),Bash(git status),Bash(git diff:*),Bash(git log:*)"'

          # Optional: Give a custom prompt to Claude. If this is not specified, Claude will perform the instructions specified in the comment that tagged it.
          # prompt: 'Update the pull request description to include a summary of changes.'
