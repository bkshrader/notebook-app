name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

concurrency:
  group: claude-mention-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude:
    # `if:` gates on '@claude' text only — collaborator authorization is
    # enforced by the preflight step below, which asks GitHub for the live
    # collaborator status of the triggering user rather than relying on a
    # hardcoded list. Keeping the text gate in `if:` avoids spinning up a
    # runner for every issue/comment event in the repo.
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      # Verify the triggering user is a collaborator on this repo BEFORE
      # invoking Claude. Anyone with a GitHub account can write '@claude' in
      # a public comment, so this gate is what prevents internet-triggered
      # runs. GH returns 204 for collaborators and 404 for non-collaborators;
      # `gh api` exits non-zero on 4xx, so the step fails closed.
      #
      # GITHUB_TOKEN is scoped to this step only, so it is not present in env
      # for the Claude step below (which uses OIDC-minted credentials instead).
      - name: Verify triggering user has collaborator access
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/collaborators/${{ github.actor }}" --silent \
            || { echo "::error::${{ github.actor }} is not a collaborator on ${{ github.repository }}; refusing to run @claude."; exit 1; }

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Read-and-comment tool allowlist. No Edit/Write/Bash(npm:*) for now —
          # this workflow is internet-triggered (anyone can write '@claude' in a
          # public comment), so the bound on damage from prompt injection or
          # account-takeover is the size of this allowlist. Broaden when this
          # workflow is actively used and the use cases are known.
          claude_args: '--allowedTools "Read,Grep,Glob,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh issue view:*),Bash(git status),Bash(git diff:*),Bash(git log:*)"'

          # Optional: Give a custom prompt to Claude. If this is not specified, Claude will perform the instructions specified in the comment that tagged it.
          # prompt: 'Update the pull request description to include a summary of changes.'
