name: Claude Code

# @claude-mention bot for the maintainer. Internet-triggered (anyone can
# write '@claude' in a public comment) so the collaborator gate is
# load-bearing — see the if: + preflight step below.
#
# Threat model: docs/features/continuous-integration/adrs/ci-threat-model.md
# Action pinning: docs/features/continuous-integration/adrs/claude-code-action-pinning.md
#
# OIDC + id-token semantics, prompt-injection caveats, and the
# allowlist-bounding-blast-radius argument are documented in
# adrs/claude-dependency-review.md (the bot-side rationale applies
# identically here).

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

concurrency:
  group: claude-mention-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude:
    # Belt-and-suspenders permission gate:
    # - `if:` checks `author_association` for fast eager rejection — this
    #   avoids spinning up a runner when a non-collaborator writes '@claude'
    #   in a public comment. `author_association` is set by GitHub at trigger
    #   time and reflects the user's permission on the repo at that moment.
    # - The preflight step below makes a live API call as defense-in-depth
    #   against any future edge case where `author_association` lags actual
    #   permissions (e.g., permission revocation between trigger and run).
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') && contains(fromJSON('["OWNER","COLLABORATOR","MEMBER"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude') && contains(fromJSON('["OWNER","COLLABORATOR","MEMBER"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude') && contains(fromJSON('["OWNER","COLLABORATOR","MEMBER"]'), github.event.review.author_association)) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')) && contains(fromJSON('["OWNER","COLLABORATOR","MEMBER"]'), github.event.issue.author_association))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write # OIDC token issuance; not repo write. See ADR.
      actions: read # so Claude can read CI results on PRs
    steps:
      # Verify the triggering user is a collaborator on this repo BEFORE
      # invoking Claude. Anyone with a GitHub account can write '@claude' in
      # a public comment, so this gate is what prevents internet-triggered
      # runs. GH returns 204 for collaborators and 404 for non-collaborators;
      # `gh api` exits non-zero on 4xx, so the step fails closed.
      #
      # GITHUB_TOKEN is scoped to this step only, so it is not present in env
      # for the Claude step below (which uses OIDC-minted credentials instead).
      - name: Verify triggering user has collaborator access
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/collaborators/${{ github.actor }}" --silent \
            || { echo "::error::${{ github.actor }} is not a collaborator on ${{ github.repository }}; refusing to run @claude."; exit 1; }

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1.0.127 # moving tag deliberate; see ADR
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read

          # Read-and-comment allowlist. No Edit/Write/Bash(npm:*) — this
          # workflow is internet-triggered, so the allowlist size bounds
          # damage from prompt-injection or account-takeover. `gh pr view/
          # diff` and `gh issue view` are acknowledged inbound injection
          # channels; the bound is the collaborator gate plus the
          # absence of Edit/Write/network tools. Broaden only when use
          # cases justify it.
          claude_args: '--allowedTools "Read,Grep,Glob,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh issue view:*),Bash(git status),Bash(git diff:*),Bash(git log:*)"'

          # No `prompt:` here — Claude follows the instructions in the
          # comment that tagged it.
