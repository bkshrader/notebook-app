version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
    # Named groups consolidate related upgrades that need to move together
    # (peer-dep coupling, ecosystem coordination). Dependabot's pattern
    # specificity ranks exact > no-wildcard > wildcard > universal-`*`, so
    # named groups always win over an ungrouped wildcard. Packages that
    # match no group get one PR each — the pre-grouping default.
    #
    # `eslint-plugin-storybook` is excluded from the eslint group because
    # it matches both `storybook` (exact, score 1000) and the eslint
    # group's `eslint-plugin-*` (wildcard, ~104). The explicit exclude
    # disambiguates in favor of the storybook group.
    groups:
      vite-ecosystem:
        patterns:
          - 'vite'
          - 'electron-vite'
          - '@vitejs/*'
          - 'vitest'
          - '@vitest/*'
        update-types:
          - major
          - minor
          - patch
      storybook:
        patterns:
          - 'storybook'
          - '@storybook/*'
          - 'eslint-plugin-storybook'
        update-types:
          - major
          - minor
          - patch
      eslint:
        patterns:
          - 'eslint'
          - '@eslint/*'
          - 'typescript-eslint'
          - 'eslint-config-*'
          - 'eslint-plugin-*'
        exclude-patterns:
          - 'eslint-plugin-storybook'
        update-types:
          - major
          - minor
          - patch
      playwright:
        patterns:
          - 'playwright'
          - '@playwright/*'
          - '@axe-core/playwright'
        update-types:
          - major
          - minor
          - patch
      electron:
        patterns:
          - 'electron'
          - 'electron-builder'
        update-types:
          - major
          - minor
          - patch
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
        update-types:
          - major
          - minor
          - patch
    ignore:
      # Pin to Node 24 LTS (the project's runtime).
      - dependency-name: '@types/node'
        update-types: ['version-update:semver-major']

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
